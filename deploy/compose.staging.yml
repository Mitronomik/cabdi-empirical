services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cabdi_pilot}
      POSTGRES_USER: ${POSTGRES_USER:-cabdi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - pilot_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cabdi} -d ${POSTGRES_DB:-cabdi_pilot}"]
      interval: 5s
      timeout: 5s
      retries: 20

  participant_api:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.api
    restart: unless-stopped
    environment:
      PILOT_ENV: staging
      PILOT_DB_URL: postgresql://${POSTGRES_USER:-cabdi}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cabdi_pilot}
      PILOT_PARTICIPANT_CORS_ORIGINS: ${PILOT_PARTICIPANT_CORS_ORIGINS:?set participant public origins}
    command: >-
      uvicorn app.participant_api.main:app
      --host 0.0.0.0
      --port 8000
      --proxy-headers
      --forwarded-allow-ips="*"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 10

  researcher_api:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.api
    restart: unless-stopped
    environment:
      PILOT_ENV: staging
      PILOT_DB_URL: postgresql://${POSTGRES_USER:-cabdi}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cabdi_pilot}
      PILOT_RESEARCHER_CORS_ORIGINS: ${PILOT_RESEARCHER_CORS_ORIGINS:?set researcher private origins}
      PILOT_RESEARCHER_PASSWORD: ${PILOT_RESEARCHER_PASSWORD:?set researcher bootstrap password}
      PILOT_RESEARCHER_SESSION_SECRET: ${PILOT_RESEARCHER_SESSION_SECRET:?set researcher session secret}
      PILOT_RESEARCHER_COOKIE_SECURE: "true"
    command: >-
      uvicorn app.researcher_api.main:app
      --host 0.0.0.0
      --port 8001
      --proxy-headers
      --forwarded-allow-ips="*"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/ready', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 10

  participant_web:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.participant_web
    restart: unless-stopped

  researcher_web:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.researcher_web
    restart: unless-stopped

  edge_proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /var/log/nginx
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    depends_on:
      participant_api:
        condition: service_healthy
      researcher_api:
        condition: service_started
      participant_web:
        condition: service_started
      researcher_web:
        condition: service_started
    volumes:
      - ./nginx/edge.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:8080"
      - "127.0.0.1:8081:8081"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  pilot_postgres_data:
