[tool.pytest.ini_options]
pythonpath = ["."]
addopts = "-q"

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "B"]
ignore = ["E501", "I001"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.11"
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true
no_implicit_optional = true
check_untyped_defs = true
ignore_missing_imports = true
follow_imports = "skip"
explicit_package_bases = true
pretty = true
files = [
  "app/participant_api/main.py",
  "app/participant_api/routes/health.py",
  "app/participant_api/routes/public_runs.py",
  "app/participant_api/services/policy_service.py",
  "app/researcher_api/main.py",
  "app/researcher_api/routes/health.py",
  "app/researcher_api/routes/auth.py",
  "app/researcher_api/services/auth_service.py",
]
